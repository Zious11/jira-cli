# Release Gap Fill — find git tags that lack a GitHub Release and backfill them.
#
# Why: sync-upstream pushes new upstream tags to origin, which triggers
# release.yml. But tags that landed on origin BEFORE release.yml existed
# (or before the sync workflow was wired up) never fired anything, so they
# sit on origin without a corresponding release. This workflow closes that
# gap by detecting missing releases and dispatching backfill-release.yml
# for each.
#
# Safe by design:
#   - update_homebrew=false on dispatch (never touches the stable jr formula)
#   - max-per-run guard (default 5) so a large gap can't exhaust CI
#   - dry_run input to preview before triggering anything
#
# LOCAL-ONLY: listed in .github/local-workflows.txt, not from upstream.
name: Release Gap Fill

on:
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List missing tags, do not trigger backfill'
        required: false
        type: boolean
        default: false
      max:
        description: 'Max tags to backfill per run'
        required: false
        type: string
        default: '5'

permissions:
  actions: write    # required to dispatch backfill-release.yml
  contents: read

jobs:
  gap-fill:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Compute missing releases
        id: gaps
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # All v* tags on origin (annotated and lightweight), lexicographic
          # sort because comm requires lexicographic order on both inputs.
          git tag -l 'v*' | LC_ALL=C sort > /tmp/all-tags.txt

          # All releases (up to 1000), filtered to v* and lex-sorted to match.
          gh release list --limit 1000 --json tagName --jq '.[].tagName' \
            | grep '^v' \
            | LC_ALL=C sort > /tmp/all-releases.txt

          # comm -23 = lines only in tags, not in releases. Re-sort the
          # output with -V so the report and trigger order are version-sane.
          comm -23 /tmp/all-tags.txt /tmp/all-releases.txt | sort -V > /tmp/missing.txt

          MISSING=$(wc -l < /tmp/missing.txt | tr -d ' ')
          echo "missing=$MISSING" >> "$GITHUB_OUTPUT"

          {
            echo "## Release gap report"
            echo ""
            echo "- Tags on origin: $(wc -l < /tmp/all-tags.txt | tr -d ' ')"
            echo "- Releases:       $(wc -l < /tmp/all-releases.txt | tr -d ' ')"
            echo "- Missing:        $MISSING"
            if [ "$MISSING" -gt 0 ]; then
              echo ""
              echo '### Tags without a release'
              echo '```'
              cat /tmp/missing.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger backfill for missing tags
        if: steps.gaps.outputs.missing != '0' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          MAX_PER_RUN: ${{ inputs.max || '5' }}
        run: |
          set -euo pipefail

          COUNT=0
          TRIGGERED=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            if [ "$COUNT" -ge "$MAX_PER_RUN" ]; then
              echo "Reached max=$MAX_PER_RUN per run; remaining tags will be picked up next run."
              break
            fi
            echo "Triggering backfill for $tag..."
            gh workflow run backfill-release.yml \
              --ref develop \
              -f tag="$tag" \
              -f update_homebrew=false
            TRIGGERED+=("$tag")
            COUNT=$((COUNT + 1))
            # Small delay to avoid API throttling on large gaps.
            sleep 5
          done < /tmp/missing.txt

          {
            echo ""
            echo "## Triggered"
            echo ""
            if [ "${#TRIGGERED[@]}" -eq 0 ]; then
              echo "_None._"
            else
              for t in "${TRIGGERED[@]}"; do
                echo "- $t"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"
