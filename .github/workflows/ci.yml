name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo clippy --all --all-features --tests -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo test --all-features

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d  # 1.85.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo check --all-features

  deny:
    name: Deny (licenses + vulnerabilities)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: dtolnay/rust-toolchain@c93f4f9c67595668add93d3d6895795ce52d8c2d  # stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@e5de28abeb52d916c5e5875d54b21a9e738b61ec  # cargo-llvm-cov
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  spec-guard:
    name: Spec Guards (BC counts + no numeric test counts)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Fetch factory-artifacts branch (.factory/specs/prd/)
        run: |
          git fetch origin factory-artifacts
          git worktree add .factory origin/factory-artifacts
      - name: check-spec-counts (DRIFT-001)
        run: bash scripts/check-spec-counts.sh
      - name: check-bc-no-numeric-test-counts (PG-365-1)
        run: bash scripts/check-bc-no-numeric-test-counts.sh

  security:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mutants:
    name: Mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # PR-only — mutation testing is too slow for every push to develop/main.
    # --in-diff keeps per-PR cost bounded to changed lines only.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Need full history so `cargo mutants --in-diff` can compute the diff
          # vs github.base_ref (the target branch of the PR).
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests on PR diff
        # --in-diff scopes to lines changed vs origin/<base_ref> (the merge target).
        # .cargo/mutants.toml further scopes to bulk + create modules.
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          cargo mutants --in-diff /tmp/pr.diff \
            --file src/cli/issue/create.rs \
            --file src/api/jira/bulk.rs \
            --file src/types/jira/bulk.rs
      - name: Check kill rate
        # The 90% kill-rate threshold lives here (not in .cargo/mutants.toml) for
        # CI-artifact visibility. Job passes if no mutants touch scoped files.
        run: |
          caught=$(wc -l < mutants.out/caught.txt 2>/dev/null || echo 0)
          missed=$(wc -l < mutants.out/missed.txt 2>/dev/null || echo 0)
          total=$((caught + missed))
          if [ "$total" -eq 0 ]; then
            echo "No mutants generated (diff may not touch scoped files) — skip threshold check"
            exit 0
          fi
          pct=$((caught * 100 / total))
          echo "Kill rate: ${pct}% (${caught}/${total})"
          if [ "$pct" -lt 90 ]; then
            echo "ERROR: kill rate ${pct}% is below 90% threshold"
            exit 1
          fi
