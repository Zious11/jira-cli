name: Sync Upstream

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: [main, develop]
      fail-fast: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 0
          ssh-key: ${{ secrets.SYNC_UPSTREAM_SSH_KEY }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Zious11/jira-cli.git
          git fetch upstream ${{ matrix.branch }} --tags

      - name: Check if sync needed
        id: check
        run: |
          if git merge-base --is-ancestor "upstream/${{ matrix.branch }}" HEAD; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream
        if: steps.check.outputs.needed == 'true'
        id: merge
        run: |
          set -euo pipefail

          # Read protected files list before merge attempt
          PROTECTED=""
          if [[ -f .github/local-workflows.txt ]]; then
            PROTECTED=$(grep -v '^#' .github/local-workflows.txt | grep -v '^[[:space:]]*$')
          fi

          # Attempt merge
          if git merge "upstream/${{ matrix.branch }}" --no-edit; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Merge failed — check if all conflicts are in protected files
          CONFLICTED=$(git diff --name-only --diff-filter=U)
          UNRESOLVED=""

          for file in $CONFLICTED; do
            if [[ -n "$PROTECTED" ]] && echo "$PROTECTED" | grep -qxF "$file"; then
              echo "::notice::Protected file conflict resolved (ours): $file"
              git checkout --ours "$file"
              git add "$file"
            else
              UNRESOLVED="${UNRESOLVED:+$UNRESOLVED }$file"
            fi
          done

          if [[ -n "$UNRESOLVED" ]]; then
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            echo "files=$UNRESOLVED" >> "$GITHUB_OUTPUT"
            git merge --abort
          else
            git commit --no-edit
            echo "result=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on unresolved conflict
        if: steps.merge.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Upstream sync conflict on ${{ matrix.branch }}" \
            --body "$(cat <<'EOF'
          Automated upstream sync hit merge conflicts in non-protected files.

          **Branch:** `${{ matrix.branch }}`
          **Conflicted files:** `${{ steps.merge.outputs.files }}`

          To resolve manually:
          ```sh
          git fetch upstream
          git checkout ${{ matrix.branch }}
          git merge upstream/${{ matrix.branch }}
          # resolve conflicts
          git push
          ```
          EOF
          )"

      - name: Push branch
        if: steps.merge.outputs.result == 'success'
        run: |
          git push origin ${{ matrix.branch }}

      - name: Sync tags
        run: |
          git push origin --tags